<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Absensi - ro3.my.id</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .bg-primary-dark { background-color: #0A4D3C; }
        .text-gold { color: #D4AF37; }
        .icon-circle { background-color: #10B981; color: white; }
    </style>
</head>
<body class="bg-gray-100 flex justify-center min-h-screen">

    <div class="w-full max-w-md bg-gray-50 shadow-xl relative overflow-hidden flex flex-col min-h-screen">

        <!-- ================= DASHBOARD UTAMA (SELALU MUNCUL) ================= -->
        <div id="dashboard-section" class="flex-1 pb-20 relative">
            <!-- Header Section -->
            <div class="bg-primary-dark rounded-b-[40px] pt-10 pb-20 px-6 relative">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-gold text-sm font-semibold mb-1">Selamat bekerja,</p>
                        <h1 id="user-display-name" class="text-white text-3xl font-bold mb-1">Tamu</h1>
                        <p class="text-gray-300 text-sm">Staff Operational</p>
                    </div>
                    <!-- Tombol Login/Daftar atau Logout tergantung status sesi -->
                    <div id="auth-action-btn-container">
                        <button onclick="openAuthModal()" class="bg-white/20 hover:bg-white/30 text-white text-xs font-semibold py-2 px-4 rounded-full border border-white/30 transition flex items-center gap-1">
                            <i class="fa-solid fa-arrow-right-to-bracket"></i> Login / Daftar
                        </button>
                    </div>
                </div>
            </div>

            <!-- Clock In / Out Card -->
            <div class="px-6 -mt-12 relative z-10">
                <div class="bg-white rounded-2xl shadow-md p-5">
                    <h2 class="text-gray-700 font-bold text-sm mb-4">Status Shift Aktif</h2>
                    <div class="flex gap-3">
                        <button onclick="recordAttendance('Clock In')" id="btn-in" class="flex-1 bg-green-800 hover:bg-green-700 text-white py-3 rounded-xl text-sm font-bold flex justify-center items-center gap-2 transition shadow-sm">
                            <i class="fa-solid fa-arrow-right-to-bracket"></i> Clock In
                        </button>
                        <button onclick="recordAttendance('Clock Out')" id="btn-out" class="flex-1 bg-primary-dark hover:bg-green-900 text-white py-3 rounded-xl text-sm font-bold flex justify-center items-center gap-2 transition shadow-sm">
                            <i class="fa-solid fa-arrow-right-from-bracket"></i> Clock Out
                        </button>
                    </div>
                </div>
            </div>

            <!-- Menu Grid -->
            <div class="grid grid-cols-4 gap-y-6 gap-x-2 p-6 mt-4">
                <div class="flex flex-col items-center cursor-pointer">
                    <div class="icon-circle w-14 h-14 rounded-full flex justify-center items-center text-xl mb-2 shadow-sm"><i class="fa-solid fa-clipboard-list"></i></div>
                    <span class="text-xs text-center text-gray-700 font-semibold leading-tight">Daftar<br>Pengajuan</span>
                </div>
                <div class="flex flex-col items-center cursor-pointer">
                    <div class="icon-circle w-14 h-14 rounded-full flex justify-center items-center text-xl mb-2 shadow-sm"><i class="fa-solid fa-clock-rotate-left"></i></div>
                    <span class="text-xs text-center text-gray-700 font-semibold leading-tight">Request<br>Absensi</span>
                </div>
                <div class="flex flex-col items-center cursor-pointer">
                    <div class="icon-circle w-14 h-14 rounded-full flex justify-center items-center text-xl mb-2 shadow-sm"><i class="fa-solid fa-business-time"></i></div>
                    <span class="text-xs text-center text-gray-700 font-semibold leading-tight">Request<br>Lembur</span>
                </div>
                <div class="flex flex-col items-center cursor-pointer">
                    <div class="icon-circle w-14 h-14 rounded-full flex justify-center items-center text-xl mb-2 shadow-sm"><i class="fa-solid fa-plane-departure"></i></div>
                    <span class="text-xs text-center text-gray-700 font-semibold leading-tight">Request<br>Cuti</span>
                </div>
                <div class="flex flex-col items-center cursor-pointer">
                    <div class="icon-circle w-14 h-14 rounded-full flex justify-center items-center text-xl mb-2 shadow-sm"><i class="fa-solid fa-users"></i></div>
                    <span class="text-xs text-center text-gray-700 font-semibold leading-tight">Tim<br>Kami</span>
                </div>
                <div class="flex flex-col items-center cursor-pointer">
                    <div class="icon-circle w-14 h-14 rounded-full flex justify-center items-center text-xl mb-2 shadow-sm"><i class="fa-regular fa-user"></i></div>
                    <span class="text-xs text-center text-gray-700 font-semibold leading-tight">Profil<br>Saya</span>
                </div>
                <div class="flex flex-col items-center cursor-pointer">
                    <div class="icon-circle w-14 h-14 rounded-full flex justify-center items-center text-xl mb-2 shadow-sm"><i class="fa-solid fa-money-check-dollar"></i></div>
                    <span class="text-xs text-center text-gray-700 font-semibold leading-tight">Slip<br>Gaji</span>
                </div>
            </div>

            <!-- Bottom Navigation -->
            <div class="absolute bottom-0 w-full bg-white border-t flex justify-between px-6 py-3">
                <div class="flex flex-col items-center text-green-700 cursor-pointer"><i class="fa-solid fa-house mb-1"></i><span class="text-[10px] font-bold">Home</span></div>
                <div class="flex flex-col items-center text-gray-400 cursor-pointer hover:text-green-700"><i class="fa-solid fa-users mb-1"></i><span class="text-[10px] font-bold">Karyawan</span></div>
                <div class="flex flex-col items-center text-gray-400 cursor-pointer hover:text-green-700"><i class="fa-regular fa-calendar-check mb-1"></i><span class="text-[10px] font-bold">Absen Log</span></div>
                <div class="flex flex-col items-center text-gray-400 cursor-pointer hover:text-green-700"><i class="fa-regular fa-envelope mb-1"></i><span class="text-[10px] font-bold">Inbox</span></div>
                <div class="flex flex-col items-center text-gray-400 cursor-pointer hover:text-green-700"><i class="fa-regular fa-user mb-1"></i><span class="text-[10px] font-bold">Profil</span></div>
            </div>
        </div>

        <!-- ================= MODAL / POP-UP LOGIN & DAFTAR ================= -->
        <div id="auth-modal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 hidden backdrop-blur-sm">
            <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6 relative animate-fadeIn">
                <!-- Tombol Tutup Pop-up -->
                <button onclick="closeAuthModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-lg">
                    <i class="fa-solid fa-xmark"></i>
                </button>

                <div class="text-center mb-6 mt-2">
                    <h2 id="auth-title" class="text-2xl font-bold text-gray-800">Masuk Akun</h2>
                    <p class="text-gray-500 text-xs mt-1">Silakan masuk untuk mencatat absensi</p>
                </div>

                <form id="auth-form" class="space-y-4">
                    <div id="name-field" class="hidden">
                        <label class="text-xs text-gray-600 font-semibold">Nama Lengkap</label>
                        <input type="text" id="fullname" placeholder="Masukkan nama Anda" class="w-full mt-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-600">
                    </div>
                    <div>
                        <label class="text-xs text-gray-600 font-semibold">Email</label>
                        <input type="email" id="email" required placeholder="contoh@email.com" class="w-full mt-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-600">
                    </div>
                    <div>
                        <label class="text-xs text-gray-600 font-semibold">Password</label>
                        <input type="password" id="password" required placeholder="Minimal 6 karakter" class="w-full mt-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-600">
                    </div>
                    
                    <button type="submit" id="auth-btn" class="w-full bg-primary-dark hover:bg-green-900 text-white font-bold py-2.5 rounded-xl transition text-sm shadow-md mt-2">
                        Masuk
                    </button>
                </form>

                <p class="text-center text-xs text-gray-600 mt-5">
                    <span id="auth-switch-text">Belum punya akun?</span> 
                    <button type="button" onclick="toggleAuthMode()" id="auth-switch-btn" class="text-green-700 font-bold hover:underline">Daftar di sini</button>
                </p>
            </div>
        </div>

    </div>

    <!-- Script Logika & Database -->
    <script>
        const SUPABASE_URL = 'https://aiehifutwebeozxtnvej.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_QMdCN0udb1J28YZAOMv6zQ_99kor31F';
        
        let supabaseClient = null;
        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (err) {
            console.error("Gagal menginisialisasi Supabase:", err);
        }

        let isLoginMode = true;
        let currentUser = null;

        // Cek sesi saat halaman dimuat
        document.addEventListener('DOMContentLoaded', () => {
            if (supabaseClient) {
                checkSession();
            }
        });

        async function checkSession() {
            try {
                const { data: { session }, error } = await supabaseClient.auth.getSession();
                if (error) throw error;
                
                const btnContainer = document.getElementById('auth-action-btn-container');

                if (session) {
                    const userName = session.user.user_metadata?.full_name || session.user.email.split('@')[0];
                    document.getElementById('user-display-name').innerText = userName;
                    currentUser = userName;

                    // Ubah tombol pojok kanan atas menjadi tombol Keluar (Logout)
                    btnContainer.innerHTML = `
                        <button onclick="logout()" class="bg-red-500/20 hover:bg-red-500/40 text-red-100 text-xs font-semibold py-2 px-3 rounded-full border border-red-400/30 transition flex items-center gap-1">
                            <i class="fa-solid fa-power-off"></i> Keluar
                        </button>
                    `;
                } else {
                    document.getElementById('user-display-name').innerText = 'Tamu';
                    currentUser = null;

                    // Kembalikan tombol pojok kanan atas menjadi Login / Daftar
                    btnContainer.innerHTML = `
                        <button onclick="openAuthModal()" class="bg-white/20 hover:bg-white/30 text-white text-xs font-semibold py-2 px-4 rounded-full border border-white/30 transition flex items-center gap-1">
                            <i class="fa-solid fa-arrow-right-to-bracket"></i> Login / Daftar
                        </button>
                    `;
                }
            } catch (err) {
                console.error("Sesi error:", err);
            }
        }

        // Fungsi Buka/Tutup Pop-up Modal
        function openAuthModal() {
            document.getElementById('auth-modal').classList.remove('hidden');
        }
        function closeAuthModal() {
            document.getElementById('auth-modal').classList.add('hidden');
        }

        // Toggle Login / Register dalam Modal
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? 'Masuk Akun' : 'Daftar Akun Baru';
            document.getElementById('auth-btn').innerText = isLoginMode ? 'Masuk' : 'Daftar Sekarang';
            document.getElementById('auth-switch-text').innerText = isLoginMode ? 'Belum punya akun?' : 'Sudah punya akun?';
            document.getElementById('auth-switch-btn').innerText = isLoginMode ? 'Daftar di sini' : 'Login di sini';
            
            const nameField = document.getElementById('name-field');
            const fullnameInput = document.getElementById('fullname');
            
            if (isLoginMode) {
                nameField.classList.add('hidden');
                fullnameInput.removeAttribute('required');
            } else {
                nameField.classList.remove('hidden');
                fullnameInput.setAttribute('required', 'true');
            }
        }

        // Proses Form Submit Login/Register
        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullname').value;
            const btn = document.getElementById('auth-btn');
            
            btn.innerText = "Memproses...";
            btn.disabled = true;

            try {
                if (isLoginMode) {
                    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    
                    alert('Berhasil Login!');
                    closeAuthModal();
                    checkSession();
                } else {
                    const { error } = await supabaseClient.auth.signUp({
                        email: email,
                        password: password,
                        options: { data: { full_name: fullName } }
                    });
                    if (error) throw error;
                    
                    alert('Registrasi berhasil! Silakan masuk.');
                    toggleAuthMode();
                    document.getElementById('password').value = '';
                }
            } catch (error) {
                alert("Gagal: " + error.message);
            } finally {
                btn.innerText = isLoginMode ? 'Masuk' : 'Daftar Sekarang';
                btn.disabled = false;
            }
        });

        // Proses Logout
        async function logout() {
            await supabaseClient.auth.signOut();
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            checkSession();
            alert('Berhasil keluar akun.');
        }

        // Catat Absensi
        async function recordAttendance(actionType) {
            if (!currentUser) {
                alert('Silakan "Login / Daftar" terlebih dahulu untuk melakukan absensi!');
                openAuthModal();
                return;
            }

            const btnId = actionType === 'Clock In' ? 'btn-in' : 'btn-out';
            const btnElement = document.getElementById(btnId);
            const originalContent = btnElement.innerHTML;
            btnElement.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Loading...';
            btnElement.disabled = true;

            try {
                const { error } = await supabaseClient
                    .from('attendance_logs')
                    .insert([{ user_name: currentUser, action_type: actionType }]);

                if (error) throw error;
                alert(`Berhasil ${actionType}!`);
            } catch (error) {
                console.error('Error:', error);
                alert(`Gagal menyimpan data: ` + error.message);
            } finally {
                btnElement.innerHTML = originalContent;
                btnElement.disabled = false;
            }
        }
    </script>
</body>
</html>
