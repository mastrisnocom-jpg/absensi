<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BINAYASA Mobile - Absensi Android UI</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts: Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Supabase JS Client CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    /* Mirror video webcam agar seperti kamera selfie HP */
    .mirror-video {
      transform: scaleX(-1);
    }
    
    /* Hide scrollbar for clean app feel */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-slate-900 text-slate-800 font-sans antialiased min-h-screen flex justify-center items-center sm:py-6">

  <!-- ==================== ANDROID APP CONTAINER ==================== -->
  <div class="w-full max-w-md bg-slate-50 min-h-screen sm:min-h-[844px] sm:max-h-[844px] sm:rounded-[40px] shadow-2xl flex flex-col relative overflow-hidden sm:border-[8px] sm:border-slate-800">
    
    <!-- Android Status Bar / Top Header -->
    <header class="bg-slate-900 text-white px-5 pt-4 pb-3 flex items-center justify-between sticky top-0 z-30 shadow-sm">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-emerald-500 to-teal-400 flex items-center justify-center shadow-md shadow-teal-500/30">
          <i data-lucide="shield-check" class="w-5 h-5 text-white"></i>
        </div>
        <div>
          <h1 class="font-extrabold text-sm tracking-wide leading-none flex items-center gap-1.5">
            BINAYASA <span class="text-[9px] px-1.5 py-0.2 bg-teal-500/20 text-teal-400 rounded border border-teal-500/30 font-bold">MOBILE</span>
          </h1>
          <p class="text-[9px] text-slate-400 font-medium tracking-wider mt-0.5">Mobile Attendance System</p>
        </div>
      </div>

      <!-- Realtime Clock Pill -->
      <div class="bg-slate-800/80 border border-slate-700/60 px-2.5 py-1 rounded-full flex items-center gap-1.5">
        <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
        <span id="live-clock" class="text-[10px] font-bold text-slate-200 tracking-wider">00:00:00</span>
      </div>
    </header>

    <!-- Scrollable Content Area -->
    <div class="flex-1 overflow-y-auto no-scrollbar pb-24">
      
      <!-- ==================== TAB 1: PRESENSI PEGAWAI ==================== -->
      <section id="tab-content-form" class="p-4 space-y-4">
        
        <!-- Camera Android Viewport -->
        <div class="bg-slate-900 rounded-3xl p-3 shadow-lg border border-slate-800 relative">
          
          <!-- Top Overlay: GPS Status -->
          <div class="flex items-center justify-between mb-2 px-1">
            <span class="text-[11px] font-bold text-slate-300 flex items-center gap-1">
              <i data-lucide="camera" class="w-3.5 h-3.5 text-teal-400"></i> Kamera Selfie
            </span>
            <div id="location-status" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-semibold bg-slate-800 text-slate-300 border border-slate-700">
              <i data-lucide="map-pin" class="w-3 h-3 mr-1 text-amber-400"></i> GPS...
            </div>
          </div>

          <!-- Camera Screen Frame -->
          <div class="relative w-full aspect-[3/4] bg-slate-950 rounded-2xl overflow-hidden shadow-inner flex items-center justify-center border border-slate-800/80">
            
            <!-- Face Focus Reticle Overlay -->
            <div id="camera-reticle" class="absolute inset-6 pointer-events-none border-2 border-dashed border-teal-400/40 rounded-full flex items-center justify-center z-10 transition-all">
              <div class="w-2 h-2 bg-teal-400/60 rounded-full"></div>
            </div>

            <!-- Live Video Feed (Direct Selfie Mode) -->
            <video id="webcam" autoplay playsinline class="w-full h-full object-cover mirror-video"></video>

            <!-- Loading Camera Overlay -->
            <div id="camera-loading" class="absolute inset-0 bg-slate-950 flex flex-col items-center justify-center gap-2 text-slate-400 z-20">
              <span class="w-6 h-6 border-2 border-teal-400 border-t-transparent rounded-full animate-spin"></span>
              <p class="text-xs font-medium">Membuka Kamera Selfie...</p>
            </div>

            <!-- Photo Preview -->
            <img id="photo-preview" class="w-full h-full object-cover mirror-video hidden" alt="Preview Selfie" />
            
            <!-- Hidden Canvas -->
            <canvas id="canvas" class="hidden"></canvas>
          </div>

          <!-- Android Shutter Controls -->
          <div class="mt-3 flex items-center justify-center gap-4">
            <button type="button" id="btn-capture" onclick="capturePhoto()" class="w-14 h-14 rounded-full bg-white border-4 border-slate-300 flex items-center justify-center shadow-lg active:scale-95 transition-all">
              <div class="w-10 h-10 rounded-full bg-teal-500 border-2 border-white"></div>
            </button>
            <button type="button" id="btn-retake" onclick="retakePhoto()" class="hidden px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs font-bold rounded-full transition flex items-center gap-1.5 border border-slate-700">
              <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> Foto Ulang
            </button>
          </div>
        </div>

        <!-- Android Input Form Card -->
        <div class="bg-white p-4 rounded-3xl border border-slate-200/80 shadow-sm space-y-3.5">
          <form id="absensi-form" onsubmit="handleFormSubmit(event)" class="space-y-3">
            
            <!-- Clock In / Clock Out Toggle -->
            <div>
              <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-wider mb-1.5">Pilih Tipe Absen</label>
              <div class="grid grid-cols-2 gap-2">
                <label class="relative flex items-center justify-center py-2.5 px-3 rounded-2xl border-2 border-emerald-500 bg-emerald-50/60 cursor-pointer transition has-[:checked]:bg-emerald-500 has-[:checked]:text-white text-emerald-800">
                  <input type="radio" name="tipe_absen" value="Clock In" checked class="sr-only" />
                  <div class="flex items-center gap-1.5 font-bold text-xs">
                    <i data-lucide="log-in" class="w-4 h-4"></i> Clock In
                  </div>
                </label>
                <label class="relative flex items-center justify-center py-2.5 px-3 rounded-2xl border-2 border-slate-200 bg-slate-50 cursor-pointer transition has-[:checked]:bg-rose-500 has-[:checked]:border-rose-500 has-[:checked]:text-white text-slate-700">
                  <input type="radio" name="tipe_absen" value="Clock Out" class="sr-only" />
                  <div class="flex items-center gap-1.5 font-bold text-xs">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Clock Out
                  </div>
                </label>
              </div>
            </div>

            <!-- Input Nama -->
            <div>
              <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-wider mb-1">Nama Lengkap</label>
              <div class="relative">
                <i data-lucide="user" class="w-4 h-4 absolute left-3.5 top-3 text-slate-400"></i>
                <input type="text" id="nama" required placeholder="Masukkan nama lengkap..." class="w-full pl-10 pr-3 py-2.5 text-xs bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-900 focus:bg-white outline-none transition font-semibold text-slate-800" />
              </div>
            </div>

            <!-- Input Jabatan -->
            <div>
              <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-wider mb-1">Jabatan / Divisi</label>
              <div class="relative">
                <i data-lucide="briefcase" class="w-4 h-4 absolute left-3.5 top-3 text-slate-400"></i>
                <input type="text" id="jabatan" required placeholder="Contoh: Staff IT / Marketing..." class="w-full pl-10 pr-3 py-2.5 text-xs bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-900 focus:bg-white outline-none transition font-semibold text-slate-800" />
              </div>
            </div>

            <!-- Input Keterangan -->
            <div>
              <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-wider mb-1">Catatan (Opsional)</label>
              <input type="text" id="keterangan" placeholder="Catatan lokasi / tugas..." class="w-full px-3 py-2 text-xs bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-900 focus:bg-white outline-none transition font-medium text-slate-800" />
            </div>

            <!-- Submit Button Android FAB Style -->
            <button type="submit" id="btn-submit" class="w-full py-3.5 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-2xl text-xs transition shadow-lg shadow-slate-900/30 flex items-center justify-center gap-2 mt-2">
              <span id="submit-spinner" class="hidden w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
              <i data-lucide="send" class="w-4 h-4"></i>
              <span id="submit-text">Kirim Absen Sekarang</span>
            </button>

          </form>
        </div>

      </section>

      <!-- ==================== TAB 2: DASHBOARD REKAP ADMIN ==================== -->
      <section id="tab-content-admin" class="hidden p-4 space-y-4">
        
        <!-- Mini Stats KPI Carousel -->
        <div class="grid grid-cols-2 gap-2.5">
          <div class="bg-white p-3 rounded-2xl border border-slate-200 shadow-sm">
            <p class="text-[9px] font-extrabold text-slate-400 uppercase">Clock In Hari Ini</p>
            <h3 id="kpi-clockin-today" class="text-xl font-extrabold text-emerald-600 mt-0.5">0</h3>
          </div>
          <div class="bg-white p-3 rounded-2xl border border-slate-200 shadow-sm">
            <p class="text-[9px] font-extrabold text-slate-400 uppercase">Clock Out Hari Ini</p>
            <h3 id="kpi-clockout-today" class="text-xl font-extrabold text-rose-600 mt-0.5">0</h3>
          </div>
        </div>

        <!-- Filter Controls -->
        <div class="bg-white p-3 rounded-2xl border border-slate-200 shadow-sm space-y-2">
          <div class="flex items-center gap-2">
            <input type="date" id="filter-date" onchange="renderDashboard()" class="flex-1 px-3 py-2 text-xs bg-slate-50 border border-slate-200 rounded-xl font-semibold outline-none" />
            <button onclick="exportToCSV()" class="px-3 py-2 bg-emerald-600 text-white font-bold rounded-xl text-xs flex items-center gap-1 shadow">
              <i data-lucide="download" class="w-3.5 h-3.5"></i> CSV
            </button>
          </div>
          <div class="relative">
            <i data-lucide="search" class="w-3.5 h-3.5 absolute left-3 top-2.5 text-slate-400"></i>
            <input type="text" id="search-input" onkeyup="renderDashboard()" placeholder="Cari nama karyawan..." class="w-full pl-8 pr-3 py-1.5 text-xs bg-slate-50 border border-slate-200 rounded-xl outline-none" />
          </div>
        </div>

        <!-- List Presensi Mobile Cards -->
        <div id="mobile-cards-list" class="space-y-2.5">
          <!-- Dynamic Android Cards Inserted Here -->
        </div>

      </section>

    </div>

    <!-- ==================== ANDROID BOTTOM NAVIGATION BAR ==================== -->
    <nav class="absolute bottom-0 inset-x-0 bg-white border-t border-slate-200/80 px-6 py-2 flex justify-around items-center z-40">
      <button id="tab-btn-form" onclick="switchTab('form')" class="flex flex-col items-center gap-1 text-slate-900 font-bold">
        <div class="p-1 rounded-full bg-slate-900 text-white shadow-sm">
          <i data-lucide="camera" class="w-4 h-4"></i>
        </div>
        <span class="text-[10px]">Presensi</span>
      </button>
      <button id="tab-btn-admin" onclick="switchTab('admin')" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-900 font-semibold transition">
        <div class="p-1 text-slate-500">
          <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
        </div>
        <span class="text-[10px]">Rekap Data</span>
      </button>
    </nav>

  </div>

  <!-- ==================== LIGHTBOX MODAL FOTO ==================== -->
  <div id="lightbox-modal" class="hidden fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl max-w-xs w-full overflow-hidden shadow-2xl relative">
      <button onclick="closeLightbox()" class="absolute top-3 right-3 p-1.5 rounded-full bg-slate-900/60 text-white">
        <i data-lucide="x" class="w-4 h-4"></i>
      </button>
      <img id="modal-img" src="" alt="Detail Selfie" class="w-full aspect-[3/4] object-cover mirror-video" />
      <div class="p-4 bg-white space-y-1">
        <h4 id="modal-nama" class="font-bold text-slate-900 text-sm"></h4>
        <p id="modal-waktu" class="text-xs text-slate-500"></p>
      </div>
    </div>
  </div>

  <!-- ==================== TOAST NOTIFICATION ==================== -->
  <div id="toast" class="fixed top-5 inset-x-0 mx-auto max-w-xs z-50 transform -translate-y-20 opacity-0 transition-all duration-300 pointer-events-none px-4">
    <div id="toast-bg" class="flex items-center gap-3 px-4 py-3 rounded-2xl shadow-xl text-white text-xs font-semibold">
      <i id="toast-icon" data-lucide="check-circle" class="w-5 h-5"></i>
      <div>
        <p id="toast-title" class="font-bold"></p>
        <p id="toast-message" class="text-[11px] opacity-90"></p>
      </div>
    </div>
  </div>

  <!-- ==================== JAVASCRIPT CORE ==================== -->
  <script>
    // 1. CONFIGURATION SUPABASE
    const SUPABASE_URL = 'https://aiehifutwebeozxtnvej.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_QMdCN0udb1J28YZAOMv6zQ_99kor31F';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Global State
    let videoStream = null;
    let capturedBlob = null;
    let currentLocation = "Memuat GPS...";
    let allRecords = [];

    // Initialize App & Auto-Start Camera
    document.addEventListener("DOMContentLoaded", () => {
      lucide.createIcons();
      startClock();
      getLocation();
      startSelfieCamera(); // Directly open selfie camera!
      fetchAbsensiData();
      
      document.getElementById('filter-date').value = new Date().toISOString().split('T')[0];
    });

    // Realtime Clock
    function startClock() {
      function update() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      }
      update();
      setInterval(update, 1000);
    }

    // Geolocation API
    function getLocation() {
      const statusEl = document.getElementById('location-status');
      if ("geolocation" in navigator) {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const lat = pos.coords.latitude.toFixed(4);
            const lng = pos.coords.longitude.toFixed(4);
            currentLocation = `${lat}, ${lng}`;
            statusEl.innerHTML = `<i data-lucide="check-circle" class="w-3 h-3 text-emerald-400 mr-1"></i> GPS Ready`;
            lucide.createIcons();
          },
          (err) => {
            currentLocation = "GPS Off";
            statusEl.innerHTML = `<i data-lucide="alert-circle" class="w-3 h-3 text-amber-400 mr-1"></i> GPS Off`;
            lucide.createIcons();
          },
          { enableHighAccuracy: true, timeout: 10000 }
        );
      }
    }

    // AUTO-START SELFIE CAMERA DIRECTLY
    async function startSelfieCamera() {
      const loadingEl = document.getElementById('camera-loading');
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 800 } }
        });
        const video = document.getElementById('webcam');
        video.srcObject = videoStream;
        loadingEl.classList.add('hidden');
      } catch (err) {
        console.error("Camera Error:", err);
        loadingEl.innerHTML = `<p class="text-xs text-rose-400 px-4 text-center">Gagal membuka kamera selfie. Izinkan akses kamera pada browser HP Anda.</p>`;
      }
    }

    // Capture Selfie Photo with Mirror Support
    function capturePhoto() {
      const video = document.getElementById('webcam');
      const canvas = document.getElementById('canvas');
      const context = canvas.getContext('2d');

      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 800;

      // Flip horizontal context so captured image matches preview mirror
      context.translate(canvas.width, 0);
      context.scale(-1, 1);
      context.drawImage(video, 0, 0, canvas.width, canvas.height);

      canvas.toBlob((blob) => {
        capturedBlob = blob;
        const imgUrl = URL.createObjectURL(blob);
        const preview = document.getElementById('photo-preview');
        preview.src = imgUrl;
        
        preview.classList.remove('hidden');
        video.classList.add('hidden');
        document.getElementById('camera-reticle').classList.add('hidden');

        document.getElementById('btn-capture').classList.add('hidden');
        document.getElementById('btn-retake').classList.remove('hidden');
      }, 'image/jpeg', 0.85);
    }

    function retakePhoto() {
      capturedBlob = null;
      document.getElementById('photo-preview').classList.add('hidden');
      document.getElementById('webcam').classList.remove('hidden');
      document.getElementById('camera-reticle').classList.remove('hidden');

      document.getElementById('btn-capture').classList.remove('hidden');
      document.getElementById('btn-retake').classList.add('hidden');
    }

    // Form Submit (Upload to Supabase)
    async function handleFormSubmit(e) {
      e.preventDefault();

      if (!capturedBlob) {
        showToast("Perhatian!", "Harap ambil foto selfie terlebih dahulu.", "error");
        return;
      }

      const nama = document.getElementById('nama').value.trim();
      const jabatan = document.getElementById('jabatan').value.trim();
      const tipeAbsen = document.querySelector('input[name="tipe_absen"]:checked').value;
      const keterangan = document.getElementById('keterangan').value.trim();

      const btnSubmit = document.getElementById('btn-submit');
      const spinner = document.getElementById('submit-spinner');
      const btnText = document.getElementById('submit-text');

      btnSubmit.disabled = true;
      spinner.classList.remove('hidden');
      btnText.innerText = "Mengirim...";

      try {
        // 1. Upload Foto
        const fileName = `selfie_${Date.now()}_${Math.random().toString(36).substring(7)}.jpg`;
        const { error: uploadError } = await supabase
          .storage
          .from('foto-absensi')
          .upload(fileName, capturedBlob, { contentType: 'image/jpeg' });

        if (uploadError) throw uploadError;

        // 2. Get Public URL
        const { data: urlData } = supabase
          .storage
          .from('foto-absensi')
          .getPublicUrl(fileName);

        const fotoUrl = urlData.publicUrl;

        // 3. Save Record
        const { error: dbError } = await supabase
          .from('absensi')
          .insert([{
            nama: nama,
            jabatan: jabatan,
            tipe_absen: tipeAbsen,
            status: 'Hadir',
            foto_url: fotoUrl,
            lokasi: currentLocation,
            keterangan: keterangan
          }]);

        if (dbError) throw dbError;

        showToast("Berhasil!", `Presensi ${tipeAbsen} berhasil terkirim.`, "success");

        document.getElementById('absensi-form').reset();
        retakePhoto();
        fetchAbsensiData();

      } catch (err) {
        console.error(err);
        showToast("Gagal!", err.message || "Terjadi kesalahan koneksi.", "error");
      } finally {
        btnSubmit.disabled = false;
        spinner.classList.add('hidden');
        btnText.innerText = "Kirim Absen Sekarang";
      }
    }

    // Fetch Admin Records
    async function fetchAbsensiData() {
      try {
        const { data, error } = await supabase
          .from('absensi')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;
        allRecords = data || [];
        renderDashboard();
      } catch (err) {
        console.error("Fetch Data Error:", err);
      }
    }

    function renderDashboard() {
      const selectedDate = document.getElementById('filter-date').value;
      const searchQuery = document.getElementById('search-input').value.toLowerCase();

      const filtered = allRecords.filter(item => {
        const itemDate = new Date(item.created_at).toISOString().split('T')[0];
        const matchDate = !selectedDate || itemDate === selectedDate;
        const matchSearch = item.nama.toLowerCase().includes(searchQuery) || item.jabatan.toLowerCase().includes(searchQuery);
        return matchDate && matchSearch;
      });

      const todayStr = new Date().toISOString().split('T')[0];
      const todayRecords = allRecords.filter(item => new Date(item.created_at).toISOString().split('T')[0] === todayStr);
      
      document.getElementById('kpi-clockin-today').innerText = todayRecords.filter(r => r.tipe_absen === 'Clock In').length;
      document.getElementById('kpi-clockout-today').innerText = todayRecords.filter(r => r.tipe_absen === 'Clock Out').length;

      const cardsContainer = document.getElementById('mobile-cards-list');
      if (filtered.length === 0) {
        cardsContainer.innerHTML = `<div class="text-center py-8 text-slate-400 text-xs">Belum ada riwayat presensi.</div>`;
        return;
      }

      cardsContainer.innerHTML = filtered.map(item => {
        const dt = new Date(item.created_at);
        const timeStr = dt.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        const dateStr = dt.toLocaleDateString('id-ID', { day: '2-digit', month: 'short' });
        
        const isClockIn = item.tipe_absen === 'Clock In';
        const badgeClass = isClockIn ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800';

        return `
          <div class="bg-white p-3 rounded-2xl border border-slate-200/80 shadow-sm flex items-center justify-between gap-3">
            <div class="flex items-center gap-3">
              ${item.foto_url ? `
                <img src="${item.foto_url}" class="w-11 h-11 rounded-xl object-cover border border-slate-200 cursor-pointer" onclick="openLightbox('${item.foto_url}', '${escapeHtml(item.nama)}', '${timeStr}')" />
              ` : `
                <div class="w-11 h-11 rounded-xl bg-slate-100 flex items-center justify-center text-slate-400"><i data-lucide="user" class="w-5 h-5"></i></div>
              `}
              <div>
                <h4 class="font-bold text-xs text-slate-900 leading-snug">${escapeHtml(item.nama)}</h4>
                <p class="text-[10px] text-slate-400 font-medium">${escapeHtml(item.jabatan)}</p>
                <span class="text-[9px] text-slate-400 font-mono">${timeStr} WIB • ${dateStr}</span>
              </div>
            </div>
            <div class="text-right">
              <span class="px-2 py-0.5 rounded-full text-[9px] font-bold ${badgeClass}">
                ${item.tipe_absen}
              </span>
            </div>
          </div>
        `;
      }).join('');

      lucide.createIcons();
    }

    // Export CSV
    function exportToCSV() {
      if (allRecords.length === 0) return alert("Data kosong!");
      let csv = 'No,Waktu,Nama,Jabatan,Tipe,Lokasi,URL Foto,Keterangan\n';
      allRecords.forEach((item, index) => {
        const dt = new Date(item.created_at).toLocaleString('id-ID');
        csv += `"${index + 1}","${dt}","${item.nama}","${item.jabatan}","${item.tipe_absen}","${item.lokasi || ''}","${item.foto_url || ''}","${item.keterangan || ''}"\n`;
      });

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `Rekap_Absensi_${new Date().toISOString().split('T')[0]}.csv`;
      link.click();
    }

    // Android Tab Switcher
    function switchTab(tab) {
      const formContent = document.getElementById('tab-content-form');
      const adminContent = document.getElementById('tab-content-admin');
      const btnForm = document.getElementById('tab-btn-form');
      const btnAdmin = document.getElementById('tab-btn-admin');

      if (tab === 'form') {
        formContent.classList.remove('hidden');
        adminContent.classList.add('hidden');
        btnForm.className = "flex flex-col items-center gap-1 text-slate-900 font-bold";
        btnForm.querySelector('div').className = "p-1 rounded-full bg-slate-900 text-white shadow-sm";
        btnAdmin.className = "flex flex-col items-center gap-1 text-slate-400 hover:text-slate-900 font-semibold transition";
        btnAdmin.querySelector('div').className = "p-1 text-slate-500";
      } else {
        formContent.classList.add('hidden');
        adminContent.classList.remove('hidden');
        btnAdmin.className = "flex flex-col items-center gap-1 text-slate-900 font-bold";
        btnAdmin.querySelector('div').className = "p-1 rounded-full bg-slate-900 text-white shadow-sm";
        btnForm.className = "flex flex-col items-center gap-1 text-slate-400 hover:text-slate-900 font-semibold transition";
        btnForm.querySelector('div').className = "p-1 text-slate-500";
        fetchAbsensiData();
      }
    }

    // Lightbox Modal
    function openLightbox(url, nama, waktu) {
      document.getElementById('modal-img').src = url;
      document.getElementById('modal-nama').innerText = nama;
      document.getElementById('modal-waktu').innerText = "Waktu: " + waktu;
      document.getElementById('lightbox-modal').classList.remove('hidden');
    }

    function closeLightbox() {
      document.getElementById('lightbox-modal').classList.add('hidden');
    }

    // Toast Alert
    function showToast(title, message, type = "success") {
      const toast = document.getElementById('toast');
      const toastBg = document.getElementById('toast-bg');
      document.getElementById('toast-title').innerText = title;
      document.getElementById('toast-message').innerText = message;

      toastBg.className = type === "success" 
        ? "flex items-center gap-3 px-4 py-3 rounded-2xl shadow-xl bg-emerald-600 text-white text-xs font-semibold"
        : "flex items-center gap-3 px-4 py-3 rounded-2xl shadow-xl bg-rose-600 text-white text-xs font-semibold";

      toast.classList.remove('-translate-y-20', 'opacity-0');
      setTimeout(() => {
        toast.classList.add('-translate-y-20', 'opacity-0');
      }, 3500);
    }

    function escapeHtml(str) {
      return str ? str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;") : '';
    }
  </script>
</body>
