  <!-- ==================== JAVASCRIPT CORE ==================== -->
  <script>
    // 1. SUPABASE CONFIGURATION
    const SUPABASE_URL = 'https://aiehifutwebeozxtnvej.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_QMdCN0udb1J28YZAOMv6zQ_99kor31F';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Global State
    let videoStream = null;
    let capturedBlob = null;
    let currentLocation = "Memuat GPS...";
    let allRecords = [];

    document.addEventListener("DOMContentLoaded", () => {
      lucide.createIcons();
      updateShiftDate();
      getLocation();
      fetchAbsensiData();
      
      document.getElementById('filter-date').value = new Date().toISOString().split('T')[0];
    });

    function updateShiftDate() {
      const options = { day: 'numeric', month: 'long', year: 'numeric' };
      const todayStr = new Date().toLocaleDateString('id-ID', options);
      document.getElementById('current-shift-date').innerText = `${todayStr} (07:30 - 16:30)`;
    }

    // Geolocation API
    function getLocation() {
      const statusEl = document.getElementById('location-status');
      if ("geolocation" in navigator) {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const lat = pos.coords.latitude.toFixed(4);
            const lng = pos.coords.longitude.toFixed(4);
            currentLocation = `${lat}, ${lng}`;
            statusEl.innerHTML = `<i data-lucide="check-circle" class="w-3 h-3 text-emerald-500 mr-1"></i> GPS Ready`;
            lucide.createIcons();
          },
          (err) => {
            currentLocation = "GPS Nonaktif";
            statusEl.innerHTML = `<i data-lucide="alert-circle" class="w-3 h-3 text-amber-500 mr-1"></i> GPS Off`;
            lucide.createIcons();
          },
          { enableHighAccuracy: true, timeout: 10000 }
        );
      }
    }

    // Open & Close Camera Modal
    function openAbsenModal(type) {
      document.getElementById('tipe_absen_val').value = type;
      document.getElementById('modal-title').innerText = `Presensi Selfie (${type})`;
      document.getElementById('absen-modal').classList.remove('hidden');
      startSelfieCamera();
    }

    function closeAbsenModal() {
      stopCamera();
      document.getElementById('absen-modal').classList.add('hidden');
      retakePhoto();
    }

    async function startSelfieCamera() {
      const loadingEl = document.getElementById('camera-loading');
      const video = document.getElementById('webcam');

      loadingEl.classList.remove('hidden');

      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error("Browser tidak mendukung kamera.");
        }

        videoStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false
        });

        video.srcObject = videoStream;
        video.onloadedmetadata = () => {
          video.play().catch(e => console.log(e));
          loadingEl.classList.add('hidden');
        };
      } catch (err) {
        console.error("Camera Error:", err);
        loadingEl.innerHTML = `
          <div class="px-4 text-center space-y-2 z-30">
            <p class="text-xs text-rose-400 font-bold">Gagal membuka kamera selfie. Pastikan akses izin kamera diberikan.</p>
            <button onclick="startSelfieCamera()" class="px-3 py-1 bg-slate-800 text-teal-400 rounded-xl text-[10px] font-bold">Coba Lagi</button>
          </div>
        `;
      }
    }

    function stopCamera() {
      if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
        videoStream = null;
      }
    }

    function capturePhoto() {
      const video = document.getElementById('webcam');
      const canvas = document.getElementById('canvas');
      const context = canvas.getContext('2d');

      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;

      context.translate(canvas.width, 0);
      context.scale(-1, 1);
      context.drawImage(video, 0, 0, canvas.width, canvas.height);

      canvas.toBlob((blob) => {
        capturedBlob = blob;
        const imgUrl = URL.createObjectURL(blob);
        const preview = document.getElementById('photo-preview');
        preview.src = imgUrl;
        
        preview.classList.remove('hidden');
        video.classList.add('hidden');
        document.getElementById('camera-reticle').classList.add('hidden');

        document.getElementById('btn-capture').classList.add('hidden');
        document.getElementById('btn-retake').classList.remove('hidden');
      }, 'image/jpeg', 0.85);
    }

    function retakePhoto() {
      capturedBlob = null;
      document.getElementById('photo-preview').classList.add('hidden');
      document.getElementById('webcam').classList.remove('hidden');
      document.getElementById('camera-reticle').classList.remove('hidden');

      document.getElementById('btn-capture').classList.remove('hidden');
      document.getElementById('btn-retake').classList.add('hidden');
    }

    // Submit Absensi to Supabase
    async function handleFormSubmit(e) {
      e.preventDefault();

      if (!capturedBlob) {
        showToast("Perhatian!", "Harap ambil foto selfie terlebih dahulu.", "error");
        return;
      }

      const nama = document.getElementById('nama').value.trim();
      const jabatan = document.getElementById('jabatan').value.trim();
      const tipeAbsen = document.getElementById('tipe_absen_val').value;
      const keterangan = document.getElementById('keterangan').value.trim();

      const btnSubmit = document.getElementById('btn-submit');
      const spinner = document.getElementById('submit-spinner');
      const btnText = document.getElementById('submit-text');

      btnSubmit.disabled = true;
      spinner.classList.remove('hidden');
      btnText.innerText = "Mengirim...";

      try {
        const fileName = `selfie_${Date.now()}_${Math.random().toString(36).substring(7)}.jpg`;
        const { error: uploadError } = await supabase
          .storage
          .from('foto-absensi')
          .upload(fileName, capturedBlob, { contentType: 'image/jpeg' });

        if (uploadError) throw uploadError;

        const { data: urlData } = supabase
          .storage
          .from('foto-absensi')
          .getPublicUrl(fileName);

        const fotoUrl = urlData.publicUrl;

        const { error: dbError } = await supabase
          .from('absensi')
          .insert([{
            nama: nama,
            jabatan: jabatan,
            tipe_absen: tipeAbsen,
            status: 'Hadir',
            foto_url: fotoUrl,
            lokasi: currentLocation,
            keterangan: keterangan
          }]);

        if (dbError) throw dbError;

        showToast("Berhasil!", `Presensi ${tipeAbsen} berhasil disimpan.`, "success");

        closeAbsenModal();
        fetchAbsensiData();

      } catch (err) {
        console.error(err);
        showToast("Gagal!", err.message || "Terjadi kesalahan koneksi.", "error");
      } finally {
        btnSubmit.disabled = false;
        spinner.classList.add('hidden');
        btnText.innerText = "Kirim Absensi";
      }
    }

    // Fetch Records
    async function fetchAbsensiData() {
      try {
        const { data, error } = await supabase
          .from('absensi')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;
        allRecords = data || [];
        renderDashboard();
      } catch (err) {
        console.error("Fetch Data Error:", err);
      }
    }

    function renderDashboard() {
      const selectedDate = document.getElementById('filter-date').value;
      const searchQuery = document.getElementById('search-input').value.toLowerCase();

      const filtered = allRecords.filter(item => {
        const itemDate = new Date(item.created_at).toISOString().split('T')[0];
        const matchDate = !selectedDate || itemDate === selectedDate;
        const matchSearch = item.nama.toLowerCase().includes(searchQuery) || item.jabatan.toLowerCase().includes(searchQuery);
        return matchDate && matchSearch;
      });

      const cardsContainer = document.getElementById('mobile-cards-list');
      if (filtered.length === 0) {
        cardsContainer.innerHTML = `<div class="text-center py-8 text-slate-400 text-xs font-medium">Belum ada data presensi.</div>`;
        return;
      }

      cardsContainer.innerHTML = filtered.map(item => {
        const dt = new Date(item.created_at);
        const timeStr = dt.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        const dateStr = dt.toLocaleDateString('id-ID', { day: '2-digit', month: 'short' });
        const isClockIn = item.tipe_absen === 'Clock In';
        const badgeClass = isClockIn ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800';

        return `
          <div class="bg-white p-3.5 rounded-2xl border border-slate-200 shadow-sm flex items-center justify-between gap-3">
            <div class="flex items-center gap-3">
              ${item.foto_url ? `
                <img src="${item.foto_url}" class="w-11 h-11 rounded-xl object-cover border border-slate-200 cursor-pointer" onclick="openLightbox('${item.foto_url}', '${escapeHtml(item.nama)}', '${timeStr}')" />
              ` : `
                <div class="w-11 h-11 rounded-xl bg-slate-100 flex items-center justify-center text-slate-400"><i data-lucide="user" class="w-5 h-5"></i></div>
              `}
              <div>
                <h4 class="font-bold text-xs text-slate-900 leading-snug">${escapeHtml(item.nama)}</h4>
                <p class="text-[10px] text-slate-400 font-medium">${escapeHtml(item.jabatan)}</p>
                <span class="text-[9px] text-slate-400 font-mono">${timeStr} WIB • ${dateStr}</span>
              </div>
            </div>
            <span class="px-2.5 py-1 rounded-full text-[9px] font-bold ${badgeClass}">
              ${item.tipe_absen}
            </span>
          </div>
        `;
      }).join('');

      lucide.createIcons();
    }

    function exportToCSV() {
      if (allRecords.length === 0) return alert("Data kosong!");
      let csv = 'No,Waktu,Nama,Jabatan,Tipe,Lokasi,URL Foto,Keterangan\n';
      allRecords.forEach((item, index) => {
        const dt = new Date(item.created_at).toLocaleString('id-ID');
        csv += `"${index + 1}","${dt}","${item.nama}","${item.jabatan}","${item.tipe_absen}","${item.lokasi || ''}","${item.foto_url || ''}","${item.keterangan || ''}"\n`;
      });

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `Rekap_Absensi_${new Date().toISOString().split('T')[0]}.csv`;
      link.click();
    }

    // Switch Main Tabs
    function switchMainTab(tab) {
      const homeContent = document.getElementById('tab-content-home');
      const logContent = document.getElementById('tab-content-log');
      const btnHome = document.getElementById('nav-btn-home');
      const btnLog = document.getElementById('nav-btn-log');

      if (tab === 'home') {
        homeContent.classList.remove('hidden');
        logContent.classList.add('hidden');
        btnHome.className = "flex flex-col items-center gap-1 text-appNavy font-bold";
        btnLog.className = "flex flex-col items-center gap-1 text-slate-400 hover:text-slate-700 font-medium";
      } else if (tab === 'log') {
        homeContent.classList.add('hidden');
        logContent.classList.remove('hidden');
        btnLog.className = "flex flex-col items-center gap-1 text-appNavy font-bold";
        btnHome.className = "flex flex-col items-center gap-1 text-slate-400 hover:text-slate-700 font-medium";
        fetchAbsensiData();
      }
    }

    function openLightbox(url, nama, waktu) {
      document.getElementById('modal-img').src = url;
      document.getElementById('modal-nama').innerText = nama;
      document.getElementById('modal-waktu').innerText = "Waktu: " + waktu;
      document.getElementById('lightbox-modal').classList.remove('hidden');
    }

    function closeLightbox() {
      document.getElementById('lightbox-modal').classList.add('hidden');
    }

    function showToast(title, message, type = "success") {
      const toast = document.getElementById('toast');
      const toastBg = document.getElementById('toast-bg');
      document.getElementById('toast-title').innerText = title;
      document.getElementById('toast-message').innerText = message;

      toastBg.className = type === "success" 
        ? "flex items-center gap-3 px-4 py-3 rounded-2xl shadow-xl bg-emerald-600 text-white text-xs font-semibold"
        : "flex items-center gap-3 px-4 py-3 rounded-2xl shadow-xl bg-rose-600 text-white text-xs font-semibold";

      toast.classList.remove('-translate-y-20', 'opacity-0');
      setTimeout(() => {
        toast.classList.add('-translate-y-20', 'opacity-0');
      }, 3500);
    }

    function escapeHtml(str) {
      return str ? str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;") : '';
    }
  </script>
</body>
</html>
