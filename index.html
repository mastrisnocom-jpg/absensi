<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Absensi - ro3.my.id</title>
    <!-- Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .bg-primary-dark { background-color: #0A4D3C; }
        .text-gold { color: #D4AF37; }
        .icon-circle { background-color: #10B981; color: white; }
    </style>
</head>
<body class="bg-gray-100 flex justify-center min-h-screen">

    <!-- Mobile Container -->
    <div class="w-full max-w-md bg-gray-50 shadow-xl relative pb-20 overflow-hidden">
        
        <!-- Header Section -->
        <div class="bg-primary-dark rounded-b-[40px] pt-10 pb-20 px-6 relative">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-gold text-sm font-semibold mb-1">Selamat bekerja,</p>
                    <h1 class="text-white text-3xl font-bold mb-1">Sutrisno</h1>
                    <p class="text-gray-300 text-sm">Staff Operational</p>
                </div>
                <button class="bg-white/20 hover:bg-white/30 text-white text-xs font-semibold py-2 px-4 rounded-full border border-white/30 transition">
                    <i class="fa-solid fa-arrow-right-to-bracket mr-1"></i> Login / Daftar
                </button>
            </div>
        </div>

        <!-- Clock In / Out Card -->
        <div class="px-6 -mt-12 relative z-10">
            <div class="bg-white rounded-2xl shadow-md p-5">
                <h2 class="text-gray-700 font-bold text-sm mb-4">Status Shift Aktif</h2>
                <div class="flex gap-3">
                    <button onclick="recordAttendance('Clock In')" class="flex-1 bg-green-800 hover:bg-green-700 text-white py-3 rounded-xl text-sm font-bold flex justify-center items-center gap-2 transition">
                        <i class="fa-solid fa-arrow-right-to-bracket"></i> Clock In
                    </button>
                    <button onclick="recordAttendance('Clock Out')" class="flex-1 bg-primary-dark hover:bg-green-900 text-white py-3 rounded-xl text-sm font-bold flex justify-center items-center gap-2 transition">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i> Clock Out
                    </button>
                </div>
            </div>
        </div>

        <!-- Menu Grid -->
        <div class="grid grid-cols-4 gap-y-6 gap-x-2 p-6 mt-4">
            <!-- Row 1 -->
            <div class="flex flex-col items-center cursor-pointer">
                <div class="icon-circle w-14 h-14 rounded-full flex justify-center items-center text-xl mb-2 shadow-sm">
                    <i class="fa-solid fa-clipboard-list"></i>
                </div>
                <span class="text-xs text-center text-gray-700 font-semibold leading-tight">Daftar<br>Pengajuan</span>
            </div>
            <div class="flex flex-col items-center cursor-pointer">
                <div class="icon-circle w-14 h-14 rounded-full flex justify-center items-center text-xl mb-2 shadow-sm">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                </div>
                <span class="text-xs text-center text-gray-700 font-semibold leading-tight">Request<br>Absensi</span>
            </div>
            <div class="flex flex-col items-center cursor-pointer">
                <div class="icon-circle w-14 h-14 rounded-full flex justify-center items-center text-xl mb-2 shadow-sm">
                    <i class="fa-solid fa-business-time"></i>
                </div>
                <span class="text-xs text-center text-gray-700 font-semibold leading-tight">Request<br>Lembur</span>
            </div>
            <div class="flex flex-col items-center cursor-pointer">
                <div class="icon-circle w-14 h-14 rounded-full flex justify-center items-center text-xl mb-2 shadow-sm">
                    <i class="fa-solid fa-plane-departure"></i>
                </div>
                <span class="text-xs text-center text-gray-700 font-semibold leading-tight">Request<br>Cuti</span>
            </div>

            <!-- Row 2 -->
            <div class="flex flex-col items-center cursor-pointer">
                <div class="icon-circle w-14 h-14 rounded-full flex justify-center items-center text-xl mb-2 shadow-sm">
                    <i class="fa-solid fa-users"></i>
                </div>
                <span class="text-xs text-center text-gray-700 font-semibold leading-tight">Tim<br>Kami</span>
            </div>
            <div class="flex flex-col items-center cursor-pointer">
                <div class="icon-circle w-14 h-14 rounded-full flex justify-center items-center text-xl mb-2 shadow-sm">
                    <i class="fa-regular fa-user"></i>
                </div>
                <span class="text-xs text-center text-gray-700 font-semibold leading-tight">Profil<br>Saya</span>
            </div>
            <div class="flex flex-col items-center cursor-pointer">
                <div class="icon-circle w-14 h-14 rounded-full flex justify-center items-center text-xl mb-2 shadow-sm">
                    <i class="fa-solid fa-money-check-dollar"></i>
                </div>
                <span class="text-xs text-center text-gray-700 font-semibold leading-tight">Slip<br>Gaji</span>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="absolute bottom-0 w-full bg-white border-t flex justify-between px-6 py-3">
            <div class="flex flex-col items-center text-green-700 cursor-pointer">
                <i class="fa-solid fa-house mb-1"></i>
                <span class="text-[10px] font-bold">Home</span>
            </div>
            <div class="flex flex-col items-center text-gray-400 cursor-pointer hover:text-green-700">
                <i class="fa-solid fa-users mb-1"></i>
                <span class="text-[10px] font-bold">Karyawan</span>
            </div>
            <div class="flex flex-col items-center text-gray-400 cursor-pointer hover:text-green-700">
                <i class="fa-regular fa-calendar-check mb-1"></i>
                <span class="text-[10px] font-bold">Absen Log</span>
            </div>
            <div class="flex flex-col items-center text-gray-400 cursor-pointer hover:text-green-700">
                <i class="fa-regular fa-envelope mb-1"></i>
                <span class="text-[10px] font-bold">Inbox</span>
            </div>
            <div class="flex flex-col items-center text-gray-400 cursor-pointer hover:text-green-700">
                <i class="fa-regular fa-user mb-1"></i>
                <span class="text-[10px] font-bold">Profil</span>
            </div>
        </div>

    </div>

    <!-- Script Integrasi Supabase -->
    <script>
        // Konfigurasi API Supabase (Menggunakan kredensial dari Anda)
        const SUPABASE_URL = 'https://aiehifutwebeozxtnvej.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_QMdCN0udb1J28YZAOMv6zQ_99kor31F';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Fungsi untuk mencatat absensi
        async function recordAttendance(actionType) {
            const userName = "Sutrisno"; // Bisa dibuat dinamis jika ada sistem login
            
            try {
                const { data, error } = await supabase
                    .from('attendance_logs')
                    .insert([
                        { user_name: userName, action_type: actionType }
                    ]);

                if (error) throw error;
                
                alert(`Berhasil melakukan ${actionType}! Data telah tersimpan di server.`);
            } catch (error) {
                console.error('Error:', error);
                alert(`Gagal menyimpan data ${actionType}. Pesan error: ` + error.message);
            }
        }
    </script>
</body>
</html>
